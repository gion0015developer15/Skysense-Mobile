<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SkySense</title>

  <!-- SVG Favicon -->
  <link rel="icon" type="image/svg+xml" href="skysense-f<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a2a4a"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </radialGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7dd3fc" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7dd3fc" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Dark background -->
  <rect width="32" height="32" rx="7" fill="url(#bgGrad)"/>
  <!-- Glow halo -->
  <circle cx="16" cy="16" r="11" fill="url(#glowGrad)"/>
  <!-- Sun core -->
  <circle cx="16" cy="16" r="5" fill="#f0e68c" opacity="0.95"/>
  <!-- Sun rays (dashed/dotted style like logo) -->
  <!-- 8 rays at 45-degree intervals -->
  <g stroke="#f0e68c" stroke-width="1.5" stroke-linecap="round" opacity="0.85">
    <!-- Top -->
    <line x1="16" y1="8.5" x2="16" y2="6.5"/>
    <!-- Top-right -->
    <line x1="20.2" y1="9.8" x2="21.6" y2="8.4"/>
    <!-- Right -->
    <line x1="23.5" y1="16" x2="25.5" y2="16"/>
    <!-- Bottom-right -->
    <line x1="22.2" y1="20.2" x2="23.6" y2="21.6"/>
    <!-- Bottom -->
    <line x1="16" y1="23.5" x2="16" y2="25.5"/>
    <!-- Bottom-left -->
    <line x1="11.8" y1="22.2" x2="10.4" y2="23.6"/>
    <!-- Left -->
    <line x1="8.5" y1="16" x2="6.5" y2="16"/>
    <!-- Top-left -->
    <line x1="9.8" y1="11.8" x2="8.4" y2="10.4"/>
  </g>
</svg>avicon.svg">
